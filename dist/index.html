<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZeroCenter Messenger</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-tertiary: #1a1a25;
            --accent-primary: #00f0ff;
            --accent-secondary: #7000ff;
            --text-primary: #e0e0ff;
            --text-secondary: #9090b0;
            --border-color: #2a2a3a;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
        }

        .app-container {
            display: flex;
            height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 300px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .sidebar-header h1 {
            font-size: 1.2rem;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .peer-id {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 5px;
            font-family: monospace;
        }

        .contacts-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .contact-item {
            display: flex;
            align-items: center;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .contact-item:hover {
            background: rgba(0, 240, 255, 0.1);
        }

        .contact-item.active {
            background: rgba(0, 240, 255, 0.15);
        }

        .contact-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-right: 12px;
        }

        .contact-info {
            flex: 1;
        }

        .contact-name {
            font-weight: 600;
            font-size: 0.95rem;
        }

        .contact-status {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .add-contact-btn {
            margin: 10px;
            padding: 12px;
            background: rgba(0, 240, 255, 0.1);
            border: 1px solid var(--accent-primary);
            border-radius: 8px;
            color: var(--accent-primary);
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        .add-contact-btn:hover {
            background: rgba(0, 240, 255, 0.2);
        }

        /* Main chat area */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            background: var(--bg-secondary);
        }

        .chat-header h2 {
            font-size: 1.1rem;
        }

        .chat-header .status {
            font-size: 0.8rem;
            color: var(--success, #00ff88);
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .message {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }

        .message.own {
            align-items: flex-end;
        }

        .message-bubble {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
        }

        .message.own .message-bubble {
            background: linear-gradient(135deg, rgba(0, 240, 255, 0.2), rgba(112, 0, 255, 0.2));
            border-color: var(--accent-primary);
        }

        .message-sender {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .message-content {
            line-height: 1.4;
        }

        .message-time {
            font-size: 0.7rem;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        /* Message input */
        .message-input-container {
            padding: 20px;
            border-top: 1px solid var(--border-color);
            background: var(--bg-secondary);
        }

        .message-input-wrapper {
            display: flex;
            gap: 10px;
        }

        .message-input {
            flex: 1;
            padding: 12px 16px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            color: var(--text-primary);
            font-size: 0.95rem;
            outline: none;
        }

        .message-input:focus {
            border-color: var(--accent-primary);
        }

        .send-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            border: none;
            color: var(--bg-primary);
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
        }

        .send-btn:hover {
            transform: scale(1.05);
        }

        /* Empty state */
        .empty-state {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: var(--text-secondary);
        }

        .empty-state .icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 30px;
            width: 400px;
            max-width: 90%;
        }

        .modal h3 {
            margin-bottom: 20px;
            color: var(--accent-primary);
        }

        .modal input {
            width: 100%;
            padding: 12px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            margin-bottom: 15px;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .modal-btn {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 600;
        }

        .modal-btn.cancel {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
        }

        .modal-btn.confirm {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: var(--bg-primary);
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h1>📡 ZeroCenter</h1>
                <div class="peer-id" id="peerId">Loading...</div>
            </div>
            
            <div class="contacts-list" id="contactsList">
                <!-- Contacts will be rendered here -->
            </div>

            <button class="add-contact-btn" onclick="showAddContactModal()">+ Add Contact</button>
        </div>

        <!-- Chat Area -->
        <div class="chat-area">
            <div class="chat-header">
                <h2 id="chatTitle">Select a contact</h2>
                <span class="status" id="connectionStatus">● Connected</span>
            </div>

            <div class="messages-container" id="messagesContainer">
                <div class="empty-state">
                    <div class="icon">💬</div>
                    <p>Select a contact to start messaging</p>
                </div>
            </div>

            <div class="message-input-container">
                <div class="message-input-wrapper">
                    <input 
                        type="text" 
                        class="message-input" 
                        id="messageInput"
                        placeholder="Type a message..."
                        onkeypress="handleKeyPress(event)"
                    />
                    <button class="send-btn" onclick="sendMessage()">➤</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Contact Modal -->
    <div class="modal-overlay" id="addContactModal">
        <div class="modal">
            <h3>Add Contact</h3>
            <input 
                type="text" 
                id="contactPeerId"
                placeholder="Enter Peer ID"
            />
            <input 
                type="text" 
                id="contactAlias"
                placeholder="Alias (optional)"
            />
            <div class="modal-buttons">
                <button class="modal-btn cancel" onclick="hideAddContactModal()">Cancel</button>
                <button class="modal-btn confirm" onclick="addContact()">Add</button>
            </div>
        </div>
    </div>

    <script>
        const { invoke } = window.__TAURI__.core;

        let selectedContact = null;
        let contacts = [];

        // Initialize app
        async function init() {
            try {
                const peerId = await invoke('get_peer_id');
                document.getElementById('peerId').textContent = `ID: ${peerId.slice(0, 16)}...`;
            } catch (error) {
                document.getElementById('peerId').textContent = 'Error loading ID';
                console.error(error);
            }

            await loadContacts();
        }

        // Load contacts
        async function loadContacts() {
            try {
                contacts = await invoke('get_contacts');
                renderContacts();
            } catch (error) {
                console.error('Error loading contacts:', error);
            }
        }

        // Render contacts list
        function renderContacts() {
            const container = document.getElementById('contactsList');
            container.innerHTML = contacts.map(contact => `
                <div class="contact-item ${selectedContact === contact.peer_id ? 'active' : ''}" 
                     onclick="selectContact('${contact.peer_id}', '${contact.alias || contact.peer_id}')">
                    <div class="contact-avatar">${(contact.alias || contact.peer_id)[0].toUpperCase()}</div>
                    <div class="contact-info">
                        <div class="contact-name">${contact.alias || contact.peer_id.slice(0, 8)}</div>
                        <div class="contact-status">● Online</div>
                    </div>
                </div>
            `).join('');
        }

        // Select a contact
        function selectContact(peerId, name) {
            selectedContact = peerId;
            document.getElementById('chatTitle').textContent = name;
            renderContacts();
            loadMessages(peerId);
        }

        // Load messages for a contact
        async function loadMessages(contactId) {
            try {
                const messages = await invoke('get_messages', { contact: contactId });
                renderMessages(messages);
            } catch (error) {
                console.error('Error loading messages:', error);
            }
        }

        // Render messages
        function renderMessages(messages) {
            const container = document.getElementById('messagesContainer');
            if (messages.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">👋</div>
                        <p>No messages yet. Say hello!</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = messages.map(msg => `
                <div class="message ${msg.is_own ? 'own' : ''}">
                    <div class="message-bubble">
                        <div class="message-sender">${msg.sender}</div>
                        <div class="message-content">${msg.content}</div>
                        <div class="message-time">${new Date(msg.timestamp * 1000).toLocaleTimeString()}</div>
                    </div>
                </div>
            `).join('');

            container.scrollTop = container.scrollHeight;
        }

        // Send a message
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const content = input.value.trim();
            
            if (!content || !selectedContact) return;

            try {
                await invoke('send_message', { recipient: selectedContact, content });
                input.value = '';
                loadMessages(selectedContact);
            } catch (error) {
                console.error('Error sending message:', error);
            }
        }

        // Handle Enter key
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        // Show add contact modal
        function showAddContactModal() {
            document.getElementById('addContactModal').classList.add('active');
        }

        // Hide add contact modal
        function hideAddContactModal() {
            document.getElementById('addContactModal').classList.remove('active');
            document.getElementById('contactPeerId').value = '';
            document.getElementById('contactAlias').value = '';
        }

        // Add a contact
        async function addContact() {
            const peerId = document.getElementById('contactPeerId').value.trim();
            const alias = document.getElementById('contactAlias').value.trim();

            if (!peerId) {
                alert('Please enter a Peer ID');
                return;
            }

            try {
                await invoke('add_contact', { peerId, alias });
                hideAddContactModal();
                loadContacts();
            } catch (error) {
                alert('Error adding contact: ' + error);
            }
        }

        // Initialize on load
        init();
    </script>
</body>
</html>
