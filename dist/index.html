<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ME55 Messenger</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-tertiary: #1a1a25;
            --accent-primary: #00f0ff;
            --accent-secondary: #7000ff;
            --text-primary: #e0e0ff;
            --text-secondary: #9090b0;
            --border-color: #2a2a3a;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
        }

        .app-container {
            display: flex;
            height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 300px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .sidebar-header h1 {
            font-size: 1.2rem;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .peer-id {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 5px;
            font-family: monospace;
            cursor: pointer;
            padding: 3px 6px;
            margin-left: -6px;
            border-radius: 4px;
            transition: background 0.15s, color 0.15s;
            user-select: none;
        }
        .peer-id:hover {
            background: rgba(255, 255, 255, 0.06);
        }
        .peer-id.copied {
            color: #3fb950;
        }

        .contacts-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .contact-item {
            display: flex;
            align-items: center;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .contact-item:hover {
            background: rgba(0, 240, 255, 0.1);
        }

        .contact-item.active {
            background: rgba(0, 240, 255, 0.15);
        }

        .contact-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-right: 12px;
        }

        .contact-info {
            flex: 1;
        }

        .contact-name {
            font-weight: 600;
            font-size: 0.95rem;
        }

        .contact-status {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .add-contact-btn {
            margin: 10px;
            padding: 12px;
            background: rgba(0, 240, 255, 0.1);
            border: 1px solid var(--accent-primary);
            border-radius: 8px;
            color: var(--accent-primary);
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        .add-contact-btn:hover {
            background: rgba(0, 240, 255, 0.2);
        }

        .groups-header {
            padding: 10px 20px 4px;
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            border-top: 1px solid var(--border-color);
        }

        .group-avatar {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            background: linear-gradient(135deg, var(--accent-secondary), var(--accent-primary));
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-right: 12px;
        }

        .group-controls {
            display: flex;
            gap: 6px;
            margin-top: 6px;
        }

        .group-controls button {
            padding: 4px 10px;
            font-size: 0.75rem;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background: var(--bg-tertiary);
            color: var(--text-secondary);
            cursor: pointer;
        }

        .group-controls button:hover {
            border-color: var(--accent-primary);
            color: var(--accent-primary);
        }

        textarea.modal-textarea {
            width: 100%;
            min-height: 90px;
            padding: 10px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            margin-bottom: 15px;
            font-family: monospace;
            font-size: 0.85rem;
            resize: vertical;
        }

        /* Main chat area */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            background: var(--bg-secondary);
        }

        .chat-header h2 {
            font-size: 1.1rem;
        }

        .chat-header .status {
            font-size: 0.8rem;
            color: var(--success, #00ff88);
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .message {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }

        .message.own {
            align-items: flex-end;
        }

        .message-bubble {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
        }

        .message.own .message-bubble {
            background: linear-gradient(135deg, rgba(0, 240, 255, 0.2), rgba(112, 0, 255, 0.2));
            border-color: var(--accent-primary);
        }

        .message-sender {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .message-content {
            line-height: 1.4;
        }

        .message-time {
            font-size: 0.7rem;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        /* Message input */
        .message-input-container {
            padding: 20px;
            border-top: 1px solid var(--border-color);
            background: var(--bg-secondary);
        }

        .message-input-wrapper {
            display: flex;
            gap: 10px;
        }

        .message-input {
            flex: 1;
            padding: 12px 16px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            color: var(--text-primary);
            font-size: 0.95rem;
            outline: none;
        }

        .message-input:focus {
            border-color: var(--accent-primary);
        }

        .send-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            border: none;
            color: var(--bg-primary);
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
        }

        .send-btn:hover {
            transform: scale(1.05);
        }

        /* Empty state */
        .empty-state {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: var(--text-secondary);
        }

        .empty-state .icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 30px;
            width: 400px;
            max-width: 90%;
        }

        .modal h3 {
            margin-bottom: 20px;
            color: var(--accent-primary);
        }

        .modal input {
            width: 100%;
            padding: 12px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            margin-bottom: 15px;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .modal-btn {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 600;
        }

        .modal-btn.cancel {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
        }

        .modal-btn.confirm {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: var(--bg-primary);
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h1>📡 ME55</h1>
                <div class="peer-id" id="peerId" title="Нажмите, чтобы скопировать ваш полный PeerId">Loading...</div>
            </div>
            
            <div class="contacts-list" id="contactsList">
                <!-- Contacts will be rendered here -->
            </div>

            <button class="add-contact-btn" onclick="showAddContactModal()">+ Add Contact</button>

            <div class="groups-header">Groups</div>
            <div class="contacts-list" id="groupsList">
                <!-- Groups will be rendered here -->
            </div>

            <button class="add-contact-btn" onclick="showCreateGroupModal()">+ New Group</button>
        </div>

        <!-- Chat Area -->
        <div class="chat-area">
            <div class="chat-header">
                <h2 id="chatTitle">Select a contact</h2>
                <span class="status" id="connectionStatus">● Connected</span>
                <div id="chatControls"></div>
            </div>

            <div class="messages-container" id="messagesContainer">
                <div class="empty-state">
                    <div class="icon">💬</div>
                    <p>Select a contact to start messaging</p>
                </div>
            </div>

            <div class="message-input-container">
                <div class="message-input-wrapper">
                    <input 
                        type="text" 
                        class="message-input" 
                        id="messageInput"
                        placeholder="Type a message..."
                        onkeypress="handleKeyPress(event)"
                    />
                    <button class="send-btn" onclick="sendMessage()">➤</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Contact Modal -->
    <div class="modal-overlay" id="addContactModal">
        <div class="modal">
            <h3>Add Contact</h3>
            <input
                type="text"
                id="contactPeerId"
                placeholder="Enter Peer ID"
            />
            <input
                type="text"
                id="contactAlias"
                placeholder="Alias (optional)"
            />
            <div class="modal-buttons">
                <button class="modal-btn cancel" onclick="hideAddContactModal()">Cancel</button>
                <button class="modal-btn confirm" onclick="addContact()">Add</button>
            </div>
        </div>
    </div>

    <!-- Create Group Modal -->
    <div class="modal-overlay" id="createGroupModal">
        <div class="modal">
            <h3>Create Group</h3>
            <input type="text" id="newGroupName" placeholder="Group name" />
            <textarea class="modal-textarea" id="newGroupMembers"
                placeholder="Member Peer IDs (one per line)"></textarea>
            <div class="modal-buttons">
                <button class="modal-btn cancel" onclick="hideCreateGroupModal()">Cancel</button>
                <button class="modal-btn confirm" onclick="createGroup()">Create</button>
            </div>
        </div>
    </div>

    <!-- Add Group Member Modal -->
    <div class="modal-overlay" id="addGroupMemberModal">
        <div class="modal">
            <h3>Add member to group</h3>
            <input type="text" id="addGroupMemberPid" placeholder="Peer ID to add" />
            <div class="modal-buttons">
                <button class="modal-btn cancel" onclick="hideAddGroupMemberModal()">Cancel</button>
                <button class="modal-btn confirm" onclick="submitAddGroupMember()">Add</button>
            </div>
        </div>
    </div>

    <!-- Remove Group Member Modal -->
    <div class="modal-overlay" id="removeGroupMemberModal">
        <div class="modal">
            <h3>Remove member from group</h3>
            <input type="text" id="removeGroupMemberPid" placeholder="Peer ID to remove" />
            <div class="modal-buttons">
                <button class="modal-btn cancel" onclick="hideRemoveGroupMemberModal()">Cancel</button>
                <button class="modal-btn confirm" onclick="submitRemoveGroupMember()">Remove</button>
            </div>
        </div>
    </div>

    <script>
        const { invoke } = window.__TAURI__.core;
        const { listen } = window.__TAURI__.event;

        // 'contact' | 'group' | null — which sidebar entry is open.
        let selectedMode = null;
        let selectedContact = null;
        let selectedGroup = null; // { group_id, name, is_founder }
        let contacts = [];
        let groups = [];

        // Initialize app
        async function init() {
            try {
                const peerId = await invoke('get_peer_id');
                const peerIdEl = document.getElementById('peerId');
                const shortLabel = `ID: ${peerId.slice(0, 16)}…`;
                peerIdEl.textContent = shortLabel;
                peerIdEl.title = `${peerId}\n(нажмите, чтобы скопировать)`;
                peerIdEl.addEventListener('click', async () => {
                    try {
                        await navigator.clipboard.writeText(peerId);
                    } catch (e) {
                        // Fallback for older webview: select + execCommand.
                        const ta = document.createElement('textarea');
                        ta.value = peerId;
                        ta.style.position = 'fixed'; ta.style.opacity = '0';
                        document.body.appendChild(ta); ta.select();
                        try { document.execCommand('copy'); } catch (_) {}
                        document.body.removeChild(ta);
                    }
                    peerIdEl.textContent = '✓ Скопировано';
                    peerIdEl.classList.add('copied');
                    setTimeout(() => {
                        peerIdEl.textContent = shortLabel;
                        peerIdEl.classList.remove('copied');
                    }, 1200);
                });
            } catch (error) {
                document.getElementById('peerId').textContent = 'Error loading ID';
                console.error(error);
            }

            await loadContacts();
            await loadGroups();

            // Push-refresh on inbound DMs.
            await listen('dm-received', (event) => {
                const peer = event.payload;
                loadContacts();
                if (selectedMode === 'contact' && peer === selectedContact) {
                    loadMessages(selectedContact);
                }
            });

            // Push-refresh on inbound group messages. Payload is
            // { group_id: <hex>, sender: <base58> }. We always reload
            // the groups list (member count or recency may have shifted)
            // and re-fetch messages when the matching group is open.
            await listen('group-msg-received', (event) => {
                const { group_id } = event.payload || {};
                loadGroups();
                if (selectedMode === 'group' && selectedGroup && group_id === selectedGroup.group_id) {
                    loadGroupMessages(selectedGroup.group_id);
                }
            });
        }

        // Load contacts
        async function loadContacts() {
            try {
                contacts = await invoke('get_contacts');
                renderContacts();
            } catch (error) {
                console.error('Error loading contacts:', error);
            }
        }

        async function loadGroups() {
            try {
                groups = await invoke('get_groups');
                renderGroups();
            } catch (error) {
                console.error('Error loading groups:', error);
            }
        }

        // Render contacts list
        function renderContacts() {
            const container = document.getElementById('contactsList');
            container.innerHTML = contacts.map(contact => `
                <div class="contact-item ${selectedMode === 'contact' && selectedContact === contact.peer_id ? 'active' : ''}"
                     onclick="selectContact('${contact.peer_id}', '${escapeHtml(contact.alias || contact.peer_id)}')">
                    <div class="contact-avatar">${(contact.alias || contact.peer_id)[0].toUpperCase()}</div>
                    <div class="contact-info">
                        <div class="contact-name">${escapeHtml(contact.alias || contact.peer_id.slice(0, 8))}</div>
                        <div class="contact-status">● Online</div>
                    </div>
                </div>
            `).join('');
        }

        function renderGroups() {
            const container = document.getElementById('groupsList');
            if (!groups || groups.length === 0) {
                container.innerHTML = '';
                return;
            }
            container.innerHTML = groups.map(g => `
                <div class="contact-item ${selectedMode === 'group' && selectedGroup && selectedGroup.group_id === g.group_id ? 'active' : ''}"
                     onclick="selectGroup('${g.group_id}', '${escapeHtml(g.name)}', ${g.is_founder})">
                    <div class="group-avatar">${(g.name || '#')[0].toUpperCase()}</div>
                    <div class="contact-info">
                        <div class="contact-name">${escapeHtml(g.name)}</div>
                        <div class="contact-status">${g.member_count} member(s) · epoch ${g.epoch}${g.is_founder ? ' · founder' : ''}</div>
                    </div>
                </div>
            `).join('');
        }

        // Select a contact
        function selectContact(peerId, name) {
            selectedMode = 'contact';
            selectedContact = peerId;
            selectedGroup = null;
            document.getElementById('chatTitle').textContent = name;
            document.getElementById('chatControls').innerHTML = '';
            renderContacts();
            renderGroups();
            loadMessages(peerId);
        }

        function selectGroup(groupId, name, isFounder) {
            selectedMode = 'group';
            selectedGroup = { group_id: groupId, name, is_founder: isFounder };
            selectedContact = null;
            document.getElementById('chatTitle').textContent = `👥 ${name}`;
            const controls = document.getElementById('chatControls');
            const buttons = [];
            if (isFounder) {
                buttons.push('<button onclick="showAddGroupMemberModal()">+ Add member</button>');
                buttons.push('<button onclick="showRemoveGroupMemberModal()">- Remove member</button>');
            }
            buttons.push('<button onclick="leaveGroup()">Leave</button>');
            controls.innerHTML = `<div class="group-controls">${buttons.join('')}</div>`;
            renderContacts();
            renderGroups();
            loadGroupMessages(groupId);
        }

        // Load messages for a contact
        async function loadMessages(contactId) {
            try {
                const messages = await invoke('get_messages', { contact: contactId });
                renderMessages(messages);
            } catch (error) {
                console.error('Error loading messages:', error);
            }
        }

        async function loadGroupMessages(groupId) {
            try {
                const messages = await invoke('get_group_messages', { groupId: groupId });
                renderMessages(messages);
            } catch (error) {
                console.error('Error loading group messages:', error);
            }
        }

        // Render messages
        function renderMessages(messages) {
            const container = document.getElementById('messagesContainer');
            if (messages.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">👋</div>
                        <p>No messages yet. Say hello!</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = messages.map(msg => `
                <div class="message ${msg.is_own ? 'own' : ''}">
                    <div class="message-bubble">
                        <div class="message-sender">${msg.sender}</div>
                        <div class="message-content">${msg.content}</div>
                        <div class="message-time">${new Date(msg.timestamp * 1000).toLocaleTimeString()}</div>
                    </div>
                </div>
            `).join('');

            container.scrollTop = container.scrollHeight;
        }

        // Send a message into the currently-open chat (contact OR group).
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const content = input.value.trim();

            if (!content) return;

            try {
                if (selectedMode === 'contact' && selectedContact) {
                    await invoke('send_message', { recipient: selectedContact, content });
                    input.value = '';
                    loadMessages(selectedContact);
                } else if (selectedMode === 'group' && selectedGroup) {
                    await invoke('send_group_message', {
                        groupId: selectedGroup.group_id,
                        content,
                    });
                    input.value = '';
                    loadGroupMessages(selectedGroup.group_id);
                }
            } catch (error) {
                console.error('Error sending message:', error);
            }
        }

        // ─── Group modals ───
        function showCreateGroupModal() {
            document.getElementById('createGroupModal').classList.add('active');
        }
        function hideCreateGroupModal() {
            document.getElementById('createGroupModal').classList.remove('active');
            document.getElementById('newGroupName').value = '';
            document.getElementById('newGroupMembers').value = '';
        }
        async function createGroup() {
            const name = document.getElementById('newGroupName').value.trim();
            const membersRaw = document.getElementById('newGroupMembers').value;
            if (!name) { alert('Group name is required'); return; }
            const members = membersRaw
                .split(/\r?\n/)
                .map(s => s.trim())
                .filter(s => s.length > 0);
            try {
                await invoke('create_group', { name, members });
                hideCreateGroupModal();
                // Group list refresh happens via the next event; trigger
                // a manual reload too for snappy feedback.
                setTimeout(loadGroups, 250);
            } catch (error) {
                alert('Error creating group: ' + error);
            }
        }

        function showAddGroupMemberModal() {
            if (!selectedGroup) return;
            document.getElementById('addGroupMemberModal').classList.add('active');
        }
        function hideAddGroupMemberModal() {
            document.getElementById('addGroupMemberModal').classList.remove('active');
            document.getElementById('addGroupMemberPid').value = '';
        }
        async function submitAddGroupMember() {
            const pid = document.getElementById('addGroupMemberPid').value.trim();
            if (!selectedGroup || !pid) return;
            try {
                await invoke('add_group_member', {
                    groupId: selectedGroup.group_id,
                    peerId: pid,
                });
                hideAddGroupMemberModal();
                setTimeout(loadGroups, 250);
            } catch (error) {
                alert('Error adding member: ' + error);
            }
        }

        function showRemoveGroupMemberModal() {
            if (!selectedGroup) return;
            document.getElementById('removeGroupMemberModal').classList.add('active');
        }
        function hideRemoveGroupMemberModal() {
            document.getElementById('removeGroupMemberModal').classList.remove('active');
            document.getElementById('removeGroupMemberPid').value = '';
        }
        async function submitRemoveGroupMember() {
            const pid = document.getElementById('removeGroupMemberPid').value.trim();
            if (!selectedGroup || !pid) return;
            try {
                await invoke('remove_group_member', {
                    groupId: selectedGroup.group_id,
                    peerId: pid,
                });
                hideRemoveGroupMemberModal();
                setTimeout(loadGroups, 250);
            } catch (error) {
                alert('Error removing member: ' + error);
            }
        }

        async function leaveGroup() {
            if (!selectedGroup) return;
            if (!confirm(`Leave group "${selectedGroup.name}"?`)) return;
            try {
                await invoke('leave_group', { groupId: selectedGroup.group_id });
                selectedMode = null;
                selectedGroup = null;
                document.getElementById('chatTitle').textContent = 'Select a contact';
                document.getElementById('chatControls').innerHTML = '';
                document.getElementById('messagesContainer').innerHTML =
                    '<div class="empty-state"><div class="icon">💬</div><p>Select a contact to start messaging</p></div>';
                loadGroups();
            } catch (error) {
                alert('Error leaving group: ' + error);
            }
        }

        function escapeHtml(s) {
            if (s == null) return '';
            return String(s)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        // Handle Enter key
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        // Show add contact modal
        function showAddContactModal() {
            document.getElementById('addContactModal').classList.add('active');
        }

        // Hide add contact modal
        function hideAddContactModal() {
            document.getElementById('addContactModal').classList.remove('active');
            document.getElementById('contactPeerId').value = '';
            document.getElementById('contactAlias').value = '';
        }

        // Add a contact
        async function addContact() {
            const peerId = document.getElementById('contactPeerId').value.trim();
            const alias = document.getElementById('contactAlias').value.trim();

            if (!peerId) {
                alert('Please enter a Peer ID');
                return;
            }

            try {
                await invoke('add_contact', { peerId, alias });
                hideAddContactModal();
                loadContacts();
            } catch (error) {
                alert('Error adding contact: ' + error);
            }
        }

        // Initialize on load
        init();
    </script>
